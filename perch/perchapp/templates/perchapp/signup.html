{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - Perch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="{% static 'perchapp/styles.css' %}" rel="stylesheet">
</head>
<body>
  <div class="landing-page min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #8b1a2b 0%, #5a1018 100%);">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="text-center mb-4">
            <a href="{% url 'perchapp:landing' %}" class="text-decoration-none">
              <div class="brand-icon-lg mx-auto mb-3"><i class="fa-solid fa-house-chimney"></i></div>
              <h3 class="text-white fw-bold">Perch</h3>
            </a>
            <p class="text-white-50">Create your BC Housing account</p>
          </div>
          <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
              <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                  <label class="form-label small fw-semibold">{{ field.label }}</label>
                  {{ field }}
                  {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-maroon w-100 py-2 fw-semibold">Create Account</button>
              </form>
              <p class="text-center text-muted small mt-3 mb-0">Already have an account? <a href="{% url 'perchapp:login' %}" class="text-decoration-none fw-semibold">Sign in</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
